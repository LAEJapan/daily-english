<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English — 朝から夜まで英語フレーズ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f17;
  --surface: #17172a;
  --card: #1e1e35;
  --border: #2a2a45;
  --text: #e8e8f5;
  --muted: #6b6b9a;
  --gold: #f0c060;
  --gold-dim: #8a6c28;
  --action-c: #60a8f0;
  --feel-c: #f07880;
  --social-c: #60d0a0;
  --white: #ffffff;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(180deg, #0a0a14 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 30px; height: 30px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--white);
}
.logo-text span { color: var(--gold); }
.header-stats {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}
.stat-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
}
.stat-chip b { color: var(--gold); font-family: 'JetBrains Mono', monospace; }

/* ── MAIN LAYOUT ── */
.app-body {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── SCREEN TITLES ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── HOME SCREEN ── */
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 7vw, 3.2rem);
  line-height: 1.15;
  margin-bottom: 10px;
  color: var(--white);
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-sub {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 28px;
  line-height: 1.7;
}

/* TIME GRID */
.section-label {
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.time-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}
.time-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
}
.time-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .18s;
}
.time-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.time-card:hover::before { opacity: 1; background: var(--gold); }
.time-card.done { border-color: #2a3a2a; }
.time-card.done::before { opacity: 1; background: var(--social-c); }
.tc-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--gold);
  margin-bottom: 4px;
}
.tc-label { font-size: 12px; color: var(--muted); line-height: 1.4; }
.tc-progress {
  margin-top: 10px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.tc-progress-bar {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width .3s;
}

/* CAT FILTER */
.cat-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.cat-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.cat-btn.active-a { border-color: var(--action-c); background: rgba(96,168,240,.12); color: var(--action-c); }
.cat-btn.active-e { border-color: var(--feel-c); background: rgba(240,120,128,.12); color: var(--feel-c); }
.cat-btn.active-s { border-color: var(--social-c); background: rgba(96,208,160,.12); color: var(--social-c); }
.cat-btn:hover { border-color: var(--muted); color: var(--text); }

/* START CTA */
.cta-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.btn-primary {
  background: var(--gold);
  color: #0a0a14;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
}
.btn-primary:hover { background: #f8d080; transform: translateY(-1px); }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
}
.btn-outline:hover { border-color: var(--muted); }

/* OVERVIEW STATS */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}
.ov-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.ov-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  color: var(--gold);
  font-weight: 500;
}
.ov-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── BROWSE SCREEN ── */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  padding: 0;
  margin-bottom: 20px;
  font-family: 'Inter', sans-serif;
}
.back-btn:hover { color: var(--text); }
.browse-header {
  margin-bottom: 20px;
}
.browse-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  color: var(--gold);
}
.browse-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--white);
  margin-bottom: 6px;
}
.browse-meta { font-size: 12px; color: var(--muted); }

.phrase-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
}
.tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,.08); }

.phrase-list-browse {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bl-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 0 12px;
  align-items: start;
  cursor: pointer;
  transition: border-color .15s;
}
.bl-item:hover { border-color: var(--gold-dim); }
.bl-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding-top: 3px;
}
.bl-en { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 4px; }
.bl-ja { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
.bl-sit { font-size: 11px; color: #4a4a6a; font-style: italic; }
.bl-star {
  background: none;
  border: none;
  color: var(--border);
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  transition: color .15s;
  align-self: center;
}
.bl-star.starred { color: var(--gold); }

/* ── QUIZ SCREEN ── */
.quiz-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.quiz-progress-wrap {
  flex: 1;
  margin: 0 16px;
}
.quiz-progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width .3s;
}
.quiz-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

/* FLASH CARD */
.card-area {
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}
.flash-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: transform .15s, border-color .15s;
  position: relative;
  overflow: hidden;
}
.flash-card::after {
  content: 'タップして答えを確認';
  position: absolute;
  bottom: 14px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .05em;
}
.flash-card.revealed::after { content: ''; }
.flash-card:hover { border-color: var(--gold-dim); transform: scale(1.01); }
.fc-cat-tag {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.fc-cat-tag-a { background: rgba(96,168,240,.15); color: var(--action-c); }
.fc-cat-tag-e { background: rgba(240,120,128,.15); color: var(--feel-c); }
.fc-cat-tag-s { background: rgba(96,208,160,.15); color: var(--social-c); }
.fc-time-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
.fc-question {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  color: var(--white);
  line-height: 1.4;
  margin-bottom: 8px;
}
.fc-hint { font-size: 12px; color: #4a4a6a; font-style: italic; margin-bottom: 12px; }
.fc-answer {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
  width: 100%;
}
.fc-answer.show { display: flex; }
.fc-answer-ja { font-size: 18px; font-weight: 500; color: var(--gold); }
.fc-answer-sit { font-size: 12px; color: var(--muted); font-style: italic; }

.judge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.judge-row.hidden { visibility: hidden; }
.btn-correct {
  background: rgba(96,208,160,.15);
  border: 1px solid var(--social-c);
  color: var(--social-c);
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
}
.btn-correct:hover { background: rgba(96,208,160,.25); }
.btn-wrong {
  background: rgba(240,120,128,.12);
  border: 1px solid var(--feel-c);
  color: var(--feel-c);
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
}
.btn-wrong:hover { background: rgba(240,120,128,.22); }

.quiz-mode-label {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 20px;
  letter-spacing: .06em;
}

/* RESULT */
.result-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 20px;
}
.result-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px;
  font-weight: 500;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 8px;
}
.result-label { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
.result-comment {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--white);
  margin-bottom: 6px;
}
.result-sub { font-size: 13px; color: var(--muted); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(15,15,23,.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 200;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  cursor: pointer;
  padding: 4px 20px;
  font-family: 'Inter', sans-serif;
  transition: color .15s;
}
.nav-item span { font-size: 20px; }
.nav-item.active { color: var(--gold); }

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn .25s ease both; }

@keyframes slideFlip {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}

/* ── UTILS ── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}

/* starred list */
.starred-empty {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 40px 0;
  line-height: 1.8;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="logo">
    <div class="logo-mark">☀</div>
    <div class="logo-text">Daily<span>EN</span></div>
  </div>
  <div class="header-stats">
    <div class="stat-chip">⭐ <b id="h-starred">0</b></div>
    <div class="stat-chip">✓ <b id="h-correct">0</b></div>
  </div>
</header>

<div class="app-body">

  <!-- ═══════════════ HOME ═══════════════ -->
  <div class="screen active" id="screen-home">
    <div class="fade-in">
      <div class="hero-title">朝から夜まで<br><em>英語フレーズ</em></div>
      <div class="hero-sub">6:00〜23:00、1時間ごとに行動・感情・やりとりの英文を学ぶ。<br>全540フレーズ収録。</div>

      <div class="overview-grid">
        <div class="ov-card"><div class="ov-num">18</div><div class="ov-label">時間帯</div></div>
        <div class="ov-card"><div class="ov-num">3</div><div class="ov-label">カテゴリ</div></div>
        <div class="ov-card"><div class="ov-num">540</div><div class="ov-label">フレーズ</div></div>
      </div>

      <div class="cta-row">
        <button class="btn-primary" onclick="startQuiz('all')">🎴 クイズスタート</button>
        <button class="btn-outline" onclick="showScreen('browse-home')">📖 フレーズを見る</button>
      </div>

      <div class="section-label">時間帯を選ぶ</div>
      <div class="time-grid" id="home-time-grid"></div>

      <hr class="divider">
      <div class="section-label">カテゴリで絞る</div>
      <div class="cat-filter">
        <button class="cat-btn active-a" onclick="setCatFilter('action',this)">🏃 行動</button>
        <button class="cat-btn active-e" onclick="setCatFilter('emotion',this)">💭 感情</button>
        <button class="cat-btn active-s" onclick="setCatFilter('social',this)">💬 やりとり</button>
      </div>
      <div class="cta-row">
        <button class="btn-primary" onclick="startQuizFiltered()">選択カテゴリでクイズ</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ BROWSE HOME ═══════════════ -->
  <div class="screen" id="screen-browse-home">
    <div class="fade-in">
      <button class="back-btn" onclick="showScreen('home')">← ホームへ</button>
      <div class="browse-title" style="font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:18px;">フレーズ一覧</div>
      <div class="time-grid" id="browse-time-grid"></div>
    </div>
  </div>

  <!-- ═══════════════ BROWSE DETAIL ═══════════════ -->
  <div class="screen" id="screen-browse-detail">
    <div class="fade-in">
      <button class="back-btn" onclick="showScreen('browse-home')">← 一覧に戻る</button>
      <div class="browse-header">
        <div class="browse-time" id="bd-time"></div>
        <div class="browse-title" id="bd-title"></div>
        <div class="browse-meta" id="bd-meta"></div>
      </div>
      <div class="phrase-tabs">
        <button class="tab-btn active" onclick="switchTab('action',this)">🏃 行動</button>
        <button class="tab-btn" onclick="switchTab('emotion',this)">💭 感情</button>
        <button class="tab-btn" onclick="switchTab('social',this)">💬 やりとり</button>
      </div>
      <div class="phrase-list-browse" id="bd-list"></div>
    </div>
  </div>

  <!-- ═══════════════ QUIZ ═══════════════ -->
  <div class="screen" id="screen-quiz">
    <div class="fade-in">
      <div class="quiz-top">
        <button class="back-btn" style="margin:0" onclick="showScreen('home')">✕</button>
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-track"><div class="quiz-progress-fill" id="q-fill" style="width:0%"></div></div>
        </div>
        <div class="quiz-counter" id="q-counter">0 / 0</div>
      </div>
      <div class="quiz-mode-label" id="q-mode-label"></div>
      <div class="card-area">
        <div class="flash-card" id="flash-card" onclick="revealCard()">
          <div class="fc-cat-tag" id="fc-cat-tag"></div>
          <div class="fc-time-label" id="fc-time-label"></div>
          <div class="fc-question" id="fc-question"></div>
          <div class="fc-hint" id="fc-hint"></div>
          <div class="fc-answer" id="fc-answer">
            <div class="fc-answer-ja" id="fc-ans-ja"></div>
            <div class="fc-answer-sit" id="fc-ans-sit"></div>
          </div>
        </div>
      </div>
      <div class="judge-row hidden" id="judge-row">
        <button class="btn-correct" onclick="judge(true)">✓ 正解！</button>
        <button class="btn-wrong" onclick="judge(false)">✗ もう一度</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ RESULT ═══════════════ -->
  <div class="screen" id="screen-result">
    <div class="fade-in">
      <div class="result-box">
        <div class="result-score" id="r-score"></div>
        <div class="result-label" id="r-label"></div>
        <hr class="divider">
        <div class="result-comment" id="r-comment"></div>
        <div class="result-sub" id="r-sub"></div>
      </div>
      <div class="cta-row" style="justify-content:center">
        <button class="btn-primary" onclick="startQuiz('all')">もう一度</button>
        <button class="btn-outline" onclick="showScreen('home')">ホームへ</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ STARRED ═══════════════ -->
  <div class="screen" id="screen-starred">
    <div class="fade-in">
      <div class="browse-title" style="font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:18px;">⭐ お気に入り</div>
      <div id="starred-list"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="navTo('home')"><span>🏠</span>ホーム</button>

══════════════════════════════════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-'+name);
  if (el) { el.classList.add('active'); el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }
  ['home','browse-home','starred','quiz','result'].forEach(n => {
    const btn = document.getElementById('nav-'+n.split('-')[0]);
    if (btn) btn.classList.remove('active');
  });
  const nav = document.getElementById('nav-'+name.split('-')[0]);
  if (nav) nav.classList.add('active');
}

function navTo(name) {
  if (name === 'starred') renderStarred();
  if (name === 'browse-home') renderBrowseHome();
  showScreen(name);
}

   HOME GRID
══════════════════════════════════════════ */
function renderHomeGrid() {
  const grid = document.getElementById('home-time-grid');
  grid.innerHTML = DATA.map((h,i) => {
    const total = 30;
    const done = getTimeDone(i);
    const pct = Math.round(done/total*100);
    return `<div class="time-card${done===total?' done':''}" onclick="openBrowse(${i})">
      <div class="tc-time">${h.time}</div>
      <div class="tc-label">${h.title}</div>
      <div class="tc-progress"><div class="tc-progress-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function getTimeDone(timeIdx) {
  let count = 0;
  ['action','emotion','social'].forEach(cat => {
    const key = timeIdx+'_'+cat;
    if (progress[key]) count += progress[key].size;
  });
  return count;
}

/* ══════════════════════════════════════════
   QUIZ
══════════════════════════════════════════ */
function buildQueue(timeIdx, cats) {
  const queue = [];
  const times = timeIdx === 'all' ? DATA.map((_,i)=>i) : [timeIdx];
  times.forEach(ti => {
    cats.forEach(cat => {
      DATA[ti][cat].forEach((p,pi) => {
        queue.push({ ti, cat, pi, ...p });
      });
    });
  });
  // shuffle
  for (let i = queue.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]] = [queue[j],queue[i]];
  }
  return queue;
}

function startQuiz(timeIdx) {
  quizQueue = buildQueue(timeIdx, ['action','emotion','social']);
  quizIdx = 0; quizScore = 0;
  const modeLabels = { all:'全時間帯・全カテゴリ' };
  document.getElementById('q-mode-label').textContent = '📚 ' + (modeLabels[timeIdx] || DATA[timeIdx]?.time+' '+DATA[timeIdx]?.title);
  showScreen('quiz');
  renderCard();
}

function startQuizFiltered() {
  const cats = [...activeCats];
  if (!cats.length) { alert('カテゴリを1つ以上選んでください'); return; }
  quizQueue = buildQueue('all', cats);
  quizIdx = 0; quizScore = 0;
  const catNames = {action:'行動',emotion:'感情',social:'やりとり'};
  document.getElementById('q-mode-label').textContent = '📚 ' + cats.map(c=>catNames[c]).join(' · ');
  showScreen('quiz');
  renderCard();
}

function renderCard() {
  if (quizIdx >= quizQueue.length) { showResult(); return; }
  const item = quizQueue[quizIdx];
  quizRevealed = false;

  const fill = Math.round(quizIdx/quizQueue.length*100);
  document.getElementById('q-fill').style.width = fill+'%';
  document.getElementById('q-counter').textContent = `${quizIdx+1} / ${quizQueue.length}`;

  const catTag = document.getElementById('fc-cat-tag');
  const catLabels = {action:'🏃 行動',emotion:'💭 感情',social:'💬 やりとり'};
  const catCls = {action:'fc-cat-tag-a',emotion:'fc-cat-tag-e',social:'fc-cat-tag-s'};
  catTag.textContent = catLabels[item.cat];
  catTag.className = 'fc-cat-tag ' + catCls[item.cat];

  document.getElementById('fc-time-label').textContent = DATA[item.ti].time + ' — ' + DATA[item.ti].title;
  document.getElementById('fc-question').textContent = item.en;
  document.getElementById('fc-hint').textContent = '📍 ' + item.sit;
  document.getElementById('fc-ans-ja').textContent = item.ja;
  document.getElementById('fc-ans-sit').textContent = item.sit;

  const ans = document.getElementById('fc-answer');
  ans.classList.remove('show');
  document.getElementById('flash-card').classList.remove('revealed');
  document.getElementById('judge-row').classList.add('hidden');
}

function revealCard() {
  if (
