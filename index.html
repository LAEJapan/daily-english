
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy先生の英語カフェ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');

:root {
  --cream:   #fdf6ee;
  --latte:   #e8d8c4;
  --foam:    #fff9f3;
  --mocha:   #6b3f1e;
  --espresso:#3a1f0a;
  --caramel: #c47c2a;
  --steam:   #a08060;
  --sage:    #6a9e78;
  --blush:   #d47070;
  --sky:     #6090b8;
  --border:  #ddd0be;
  --white:   #ffffff;
  --radius:  16px;
  --shadow:  0 4px 20px rgba(58,31,10,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--cream); color: var(--espresso); min-height: 100vh; font-size: 15px; line-height: 1.7; }

.app-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 18px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(58,31,10,.06); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-cup { width: 36px; height: 36px; background: linear-gradient(135deg, var(--caramel), #e8a040); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 8px rgba(196,124,42,.3); }
.logo-text { display: flex; flex-direction: column; line-height: 1.2; }
.logo-name { font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700; color: var(--espresso); }
.logo-sub { font-size: 10px; color: var(--steam); letter-spacing: .06em; }
.header-chips { display: flex; gap: 8px; }
.chip { display: flex; align-items: center; gap: 4px; background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--steam); }
.chip b { color: var(--caramel); font-weight: 700; }

.app-body { max-width: 780px; margin: 0 auto; padding: 24px 16px 88px; }
.screen { display: none; }
.screen.active { display: block; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeUp .22s ease both; }

.home-hero { background: linear-gradient(135deg, #fff8f0 0%, #fdecd8 100%); border: 1px solid var(--latte); border-radius: 20px; padding: 28px 24px 24px; margin-bottom: 20px; position: relative; overflow: hidden; }
.home-hero::before { content: '☕'; position: absolute; right: 20px; top: 16px; font-size: 48px; opacity: .12; }
.hero-eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--caramel); margin-bottom: 8px; }
.hero-h1 { font-family: 'Noto Serif JP', serif; font-size: clamp(1.3rem, 5vw, 1.9rem); line-height: 1.45; color: var(--espresso); margin-bottom: 8px; }
.hero-h1 em { font-style: italic; color: var(--caramel); }
.hero-desc { font-size: 13px; color: var(--steam); line-height: 1.8; margin-bottom: 20px; }
.hero-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.h-stat { text-align: center; background: rgba(255,255,255,.7); border: 1px solid var(--latte); border-radius: 12px; padding: 10px 18px; }
.h-stat-num { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--caramel); font-weight: 600; }
.h-stat-label { font-size: 10px; color: var(--steam); margin-top: 2px; }
.hero-btns { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-main { background: linear-gradient(135deg, var(--mocha), #8a5030); color: var(--white); border: none; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; box-shadow: 0 4px 14px rgba(107,63,30,.25); transition: all .15s; letter-spacing: .03em; }
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(107,63,30,.3); }
.btn-sub { background: var(--white); color: var(--mocha); border: 1.5px solid var(--latte); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.btn-sub:hover { border-color: var(--caramel); }

.sec-label { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--steam); margin: 24px 0 12px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 8px; }
.time-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all .18s; position: relative; overflow: hidden; box-shadow: var(--shadow); }
.time-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--caramel), #e8a040); opacity: 0; transition: opacity .18s; }
.time-card:hover { border-color: var(--caramel); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,31,10,.1); }
.time-card:hover::after { opacity: 1; }
.time-card.done { border-color: #c0d8c0; }
.time-card.done::after { opacity: 1; background: linear-gradient(90deg, var(--sage), #8abe8a); }
.tc-time { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--caramel); margin-bottom: 3px; }
.tc-label { font-size: 11.5px; color: var(--steam); line-height: 1.5; }
.tc-bar { margin-top: 10px; height: 3px; background: var(--latte); border-radius: 2px; overflow: hidden; }
.tc-fill { height: 100%; background: linear-gradient(90deg, var(--caramel), #e8a040); border-radius: 2px; transition: width .4s ease; }

.cat-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.cat-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 30px; border: 1.5px solid var(--border); background: var(--white); color: var(--steam); font-size: 13px; cursor: pointer; transition: all .15s; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; }
.cat-btn.on-a { border-color: var(--sky); background: #eef4fa; color: var(--sky); }
.cat-btn.on-e { border-color: var(--blush); background: #faeeee; color: var(--blush); }
.cat-btn.on-s { border-color: var(--sage); background: #eef4ee; color: var(--sage); }

.back-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; color: var(--steam); font-size: 13px; cursor: pointer; padding: 6px 14px; margin-bottom: 20px; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; box-shadow: var(--shadow); }
.back-btn:hover { color: var(--mocha); border-color: var(--caramel); }

.browse-hd { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.bd-time { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--caramel); line-height: 1; margin-bottom: 4px; }
.bd-title { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--espresso); margin-bottom: 4px; }
.bd-meta { font-size: 12px; color: var(--steam); }

.phrase-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--white); color: var(--steam); font-size: 12.5px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; transition: all .15s; }
.tab-btn.active { border-color: var(--caramel); color: var(--mocha); background: #fff8f0; }

.phrase-list-browse { display: flex; flex-direction: column; gap: 8px; }
.bl-item { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: grid; grid-template-columns: 26px 1fr auto; gap: 0 12px; align-items: start; box-shadow: var(--shadow); transition: border-color .15s; }
.bl-item:hover { border-color: var(--latte); }
.bl-num { font-size: 11px; color: var(--latte); padding-top: 3px; font-weight: 700; }
.bl-en { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--espresso); margin-bottom: 4px; }
.bl-ja { font-size: 12.5px; color: var(--mocha); margin-bottom: 3px; }
.bl-sit { font-size: 11px; color: var(--steam); font-style: italic; }
.bl-star { background: none; border: none; color: var(--latte); font-size: 18px; cursor: pointer; padding: 0; transition: color .15s; align-self: center; }
.bl-star.starred { color: var(--caramel); }
.bl-star:hover { color: var(--caramel); }

.quiz-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.quiz-bar-wrap { flex: 1; }
.quiz-bar-track { height: 6px; background: var(--latte); border-radius: 3px; overflow: hidden; }
.quiz-bar-fill { height: 100%; background: linear-gradient(90deg, var(--caramel), #e8a040); border-radius: 3px; transition: width .3s; }
.quiz-counter { font-size: 12px; color: var(--steam); white-space: nowrap; }
.quiz-mode { text-align: center; font-size: 12px; color: var(--steam); margin-bottom: 18px; letter-spacing: .05em; }

.card-wrap { margin-bottom: 16px; }
.flash-card { background: var(--white); border: 2px solid var(--border); border-radius: 22px; min-height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px 48px; text-align: center; cursor: pointer; transition: all .18s; position: relative; box-shadow: 0 8px 32px rgba(58,31,10,.08); }
.flash-card::after { content: 'タップして答えを確認 ☕'; position: absolute; bottom: 16px; font-size: 11px; color: var(--latte); letter-spacing: .05em; }
.flash-card.revealed::after { content: ''; }
.flash-card:hover { border-color: var(--caramel); transform: translateY(-2px); }

.fc-cat { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; font-weight: 500; }
.fc-cat-a { background: #eef4fa; color: var(--sky); }
.fc-cat-e { background: #faeeee; color: var(--blush); }
.fc-cat-s { background: #eef4ee; color: var(--sage); }

.fc-time { font-size: 11px; color: var(--steam); margin-bottom: 10px; }
.fc-q { font-family: 'Playfair Display', serif; font-size: clamp(1.15rem, 4vw, 1.65rem); color: var(--espresso); line-height: 1.45; margin-bottom: 8px; }
.fc-hint { font-size: 12px; color: var(--latte); font-style: italic; }

.fc-answer { display: none; flex-direction: column; align-items: center; gap: 6px; margin-top: 18px; border-top: 1px solid var(--latte); padding-top: 16px; width: 100%; }
.fc-answer.show { display: flex; }
.fc-ans-ja { font-size: 20px; font-weight: 700; color: var(--caramel); font-family: 'Noto Serif JP', serif; }
.fc-ans-sit { font-size: 12px; color: var(--steam); font-style: italic; }

.judge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.judge-row.hidden { visibility: hidden; }
.btn-ok { background: #eef7ee; border: 2px solid var(--sage); color: #3a7a3a; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.btn-ok:hover { background: #d8efd8; }
.btn-ng { background: #faeeee; border: 2px solid var(--blush); color: #8a3030; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.btn-ng:hover { background: #f0d8d8; }

.result-card { background: var(--white); border: 2px solid var(--border); border-radius: 22px; padding: 36px 24px; text-align: center; box-shadow: 0 8px 32px rgba(58,31,10,.08); margin-bottom: 20px; }
.result-cup { font-size: 48px; margin-bottom: 12px; }
.result-score { font-family: 'Playfair Display', serif; font-size: 72px; color: var(--caramel); line-height: 1; margin-bottom: 6px; }
.result-pct { font-size: 14px; color: var(--steam); margin-bottom: 20px; }
.result-divider { border: none; border-top: 1px solid var(--latte); margin: 18px 0; }
.result-msg { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--espresso); margin-bottom: 6px; }
.result-sub { font-size: 13px; color: var(--steam); line-height: 1.8; }
.result-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

.starred-empty { text-align: center; color: var(--steam); font-size: 14px; padding: 48px 20px; line-height: 2; background: var(--white); border: 1.5px dashed var(--border); border-radius: var(--radius); }
.starred-empty span { font-size: 36px; display: block; margin-bottom: 12px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.96); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); z-index: 200; box-shadow: 0 -4px 20px rgba(58,31,10,.06); }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--latte); font-size: 10px; cursor: pointer; padding: 6px 20px; font-family: 'Noto Sans JP', sans-serif; transition: color .15s; border-radius: 12px; }
.nav-item span { font-size: 22px; }
.nav-item.active { color: var(--caramel); }
.nav-item:hover { color: var(--mocha); }

.screen-title { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--espresso); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.amy-msg { background: linear-gradient(135deg, #fff8f0, #fdecd8); border: 1.5px solid var(--latte); border-radius: var(--radius); padding: 14px 18px; font-size: 13px; color: var(--mocha); line-height: 1.85; margin-bottom: 20px; position: relative; }
.amy-msg::before { content: 'Amy先生より ☕'; display: block; font-size: 10.5px; font-weight: 700; color: var(--caramel); letter-spacing: .08em; margin-bottom: 5px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <div class="logo-cup">☕</div>
    <div class="logo-text">
      <div class="logo-name">Amy先生の英語カフェ</div>
      <div class="logo-sub">Daily English Phrases</div>
    </div>
  </div>
  <div class="header-chips">
    <div class="chip">★ <b id="h-star">0</b></div>
    <div class="chip">✓ <b id="h-ok">0</b></div>
  </div>
</header>

<div class="app-body">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="fade-in">
      <div class="home-hero">
        <div class="hero-eyebrow">☕ Amy先生の英語カフェへようこそ</div>
        <div class="hero-h1">朝から夜まで<br><em>日常英語フレーズ</em></div>
        <div class="hero-desc">6:00〜23:00まで、1時間ごとに「行動・感情・やりとり」の英語フレーズを学べます。クイズで楽しく、毎日少しずつ。</div>
        <div class="hero-stats">
          <div class="h-stat"><div class="h-stat-num">18</div><div class="h-stat-label">時間帯</div></div>
          <div class="h-stat"><div class="h-stat-num">3</div><div class="h-stat-label">カテゴリ</div></div>
          <div class="h-stat"><div class="h-stat-num">540</div><div class="h-stat-label">フレーズ</div></div>
        </div>
        <div class="hero-btns">
          <button class="btn-main" onclick="startQuiz('all')">☕ クイズをはじめる</button>
          <button class="btn-sub" onclick="navTo('browse-home')">📖 フレーズを見る</button>
        </div>
      </div>
      <div class="amy-msg">一日の流れに沿って英語を学ぶと、実際に「使える」感覚が身につきやすくなります。まずは今の時間帯のフレーズから試してみてくださいね。</div>
      <div class="sec-label">時間帯を選んでクイズ</div>
      <div class="time-grid" id="home-grid"></div>
      <div class="sec-label" style="margin-top:24px;">カテゴリを選んでクイズ</div>
      <div class="cat-filter">
        <button class="cat-btn on-a" onclick="toggleCat('action',this)">🏃 行動</button>
        <button class="cat-btn on-e" onclick="toggleCat('emotion',this)">💭 感情</button>
        <button class="cat-btn on-s" onclick="toggleCat('social',this)">💬 やりとり</button>
      </div>
      <button class="btn-sub" style="width:100%;text-align:center;" onclick="startQuizFiltered()">選んだカテゴリでクイズ ›</button>
    </div>
  </div>

  <!-- BROWSE HOME -->
  <div class="screen" id="screen-browse-home">
    <div class="fade-in">
      <button class="back-btn" onclick="navTo('home')">← ホームへ</button>
      <div class="screen-title">📖 フレーズ一覧</div>
      <div class="time-grid" id="browse-grid"></div>
    </div>
  </div>

  <!-- BROWSE DETAIL -->
  <div class="screen" id="screen-browse-detail">
    <div class="fade-in">
      <button class="back-btn" onclick="navTo('browse-home')">← 一覧へ戻る</button>
      <div class="browse-hd">
        <div class="bd-time" id="bd-time"></div>
        <div class="bd-title" id="bd-title"></div>
        <div class="bd-meta" id="bd-meta"></div>
      </div>
      <div class="phrase-tabs">
        <button class="tab-btn active" onclick="switchTab('action',this)">🏃 行動</button>
        <button class="tab-btn" onclick="switchTab('emotion',this)">💭 感情</button>
        <button class="tab-btn" onclick="switchTab('social',this)">💬 やりとり</button>
      </div>
      <div class="phrase-list-browse" id="bd-list"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="fade-in">
      <div class="quiz-top">
        <button class="back-btn" style="margin:0;padding:6px 12px;" onclick="navTo('home')">✕</button>
        <div class="quiz-bar-wrap"><div class="quiz-bar-track"><div class="quiz-bar-fill" id="q-fill" style="width:0%"></div></div></div>
        <div class="quiz-counter" id="q-counter">0 / 0</div>
      </div>
      <div class="quiz-mode" id="q-mode"></div>
      <div class="card-wrap">
        <div class="flash-card" id="flash-card" onclick="revealCard()">
          <div class="fc-cat" id="fc-cat"></div>
          <div class="fc-time" id="fc-time"></div>
          <div class="fc-q" id="fc-q"></div>
          <div class="fc-hint" id="fc-hint"></div>
          <div class="fc-answer" id="fc-answer">
            <div class="fc-ans-ja" id="fc-ans-ja"></div>
            <div class="fc-ans-sit" id="fc-ans-sit"></div>
          </div>
        </div>
      </div>
      <div class="judge-row hidden" id="judge-row">
        <button class="btn-ok" onclick="judge(true)">✓ わかった！</button>
        <button class="btn-ng" onclick="judge(false)">☕ もう一度</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="fade-in">
      <div class="result-card">
        <div class="result-cup">☕</div>
        <div class="result-score" id="r-score"></div>
        <div class="result-pct" id="r-pct"></div>
        <hr class="result-divider">
        <div class="result-msg" id="r-msg"></div>
        <div class="result-sub" id="r-sub"></div>
      </div>
      <div class="result-btns">
        <button class="btn-main" onclick="startQuiz('all')">もう一度チャレンジ</button>
        <button class="btn-sub" onclick="navTo('home')">ホームへ戻る</button>
      </div>
    </div>
  </div>

  <!-- STARRED -->
  <div class="screen" id="screen-starred">
    <div class="fade-in">
      <div class="screen-title">★ お気に入り</div>
      <div id="starred-list"></div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="navTo('home')"><span>🏠</span>ホーム</button>
  <button class="nav-item" id="nav-quiz" onclick="startQuiz('all')"><span>☕</span>クイズ</button>
  <button class="nav-item" id="nav-browse" onclick="navTo('browse-home')"><span>📖</span>一覧</button>
  <button class="nav-item" id="nav-starred" onclick="navTo('starred')"><span>★</span>お気に入り</button>
</nav>

<script>
/* ══════ DATA（中高生の日常シーンに全面改訂） ══════ */
const DATA = [
  { time:"6:00", title:"起床・準備開始",
    action:[
      {en:"I wake up at six every morning.",ja:"毎朝6時に起きてます。",sit:"目覚ましが鳴って布団から出る瞬間"},
      {en:"I turn off my alarm and stretch.",ja:"アラーム止めて、うーんって伸びをします。",sit:"ベッドの上でようやく目を覚ますとき"},
      {en:"I open the curtains to let in sunlight.",ja:"カーテン開けて日の光を入れます。",sit:"眠い目をこすりながら窓へ向かうとき"},
      {en:"I splash cold water on my face.",ja:"顔に冷たい水をバシャってかけます。",sit:"洗面所で眠気を一気に覚ますとき"},
      {en:"I brush my teeth for two minutes.",ja:"歯磨き2分間やります。",sit:"学校行く前の歯磨きタイム"},
      {en:"I check my phone for messages.",ja:"スマホでLINEとか確認します。",sit:"朝イチでスマホをチェックするとき"},

/* ════ STATE ════ */
let starred=new Set(), correctCount=0, progress={};
let quizQueue=[],quizIdx=0,quizScore=0,quizRevealed=false;
let activeCats=new Set(['action','emotion','social']);
let currentBrowseTime=0, currentBrowseTab='action';

/* ════ NAV ════ */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+name);
  if(el){el.classList.add('active');el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');}
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const nav=document.getElementById('nav-'+name.split('-')[0]);
  if(nav)nav.classList.add('active');
}
function navTo(name){
  if(name==='starred')renderStarred();
  if(name==='browse-home')renderBrowseHome();
  showScreen(name);
}

/* ════ HOME ════ */
function renderHomeGrid(){
  document.getElementById('home-grid').innerHTML=DATA.map((h,i)=>{
    const done=getTimeDone(i),pct=Math.round(done/30*100);
    return`<div class="time-card${done===30?' done':''}" onclick="openBrowse(${i})">
      <div class="tc-time">${h.time}</div>
      <div class="tc-label">${h.title}</div>
      <div class="tc-bar"><div class="tc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function getTimeDone(ti){return['action','emotion','social'].reduce((n,c)=>n+(progress[ti+'_'+c]?.size||0),0);}

/* ════ BROWSE ════ */
function renderBrowseHome(){
  document.getElementById('browse-grid').innerHTML=DATA.map((h,i)=>`
    <div class="time-card" onclick="openBrowse(${i})">
      <div class="tc-time">${h.time}</div>
      <div class="tc-label">${h.title}</div>
      <div class="tc-bar"><div class="tc-fill" style="width:${Math.round(getTimeDone(i)/30*100)}%"></div></div>
    </div>`).join('');
}
function openBrowse(idx){
  currentBrowseTime=idx; currentBrowseTab='action';
  const h=DATA[idx];
  document.getElementById('bd-time').textContent=h.time;
  document.getElementById('bd-title').textContent=h.title;
  document.getElementById('bd-meta').textContent='各カテゴリ10フレーズ・計30フレーズ';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderBrowseList(); showScreen('browse-detail');
}
function switchTab(cat,btn){
  currentBrowseTab=cat;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderBrowseList();
}
function renderBrowseList(){
  const phrases=DATA[currentBrowseTime][currentBrowseTab];
  document.getElementById('bd-list').innerHTML=phrases.map((p,i)=>{
    const sid=`${currentBrowseTime}_${currentBrowseTab}_${i}`;
    return`<div class="bl-item">
      <span class="bl-num">${String(i+1).padStart(2,'0')}</span>
      <div>
        <div class="bl-en">${p.en}</div>
        <div class="bl-ja">${p.ja}</div>
        <div class="bl-sit">📍 ${p.sit}</div>
      </div>
      <button class="bl-star${starred.has(sid)?' starred':''}" onclick="toggleStar('${sid}',this)">★</button>
    </div>`;
  }).join('');
}
function toggleStar(sid,btn){
  starred.has(sid)?starred.delete(sid):starred.add(sid);
  btn.classList.toggle('starred'); updateStats();
}

/* ════ STARRED ════ */
function renderStarred(){
  const c=document.getElementById('starred-list');
  if(!starred.size){c.innerHTML='<div class="starred-empty"><span>★</span>まだお気に入りがありません。<br>フレーズ一覧の ★ を押して追加してください。</div>';return;}
  const cm={action:'行動',emotion:'感情',social:'やりとり'};
  c.innerHTML=[...starred].map(sid=>{
    const[ti,cat,pi]=sid.split('_'),h=DATA[+ti],p=h[cat][+pi];
    return`<div class="bl-item" style="margin-bottom:8px">
      <span class="bl-num" style="color:var(--caramel);font-size:10px">${h.time}</span>
      <div>
        <div style="font-size:10px;color:var(--steam);margin-bottom:3px">${cm[cat]}</div>
        <div class="bl-en">${p.en}</div>
        <div class="bl-ja">${p.ja}</div>
        <div class="bl-sit">📍 ${p.sit}</div>
      </div>
      <button class="bl-star starred" onclick="toggleStar('${sid}',this);renderStarred()">★</button>
    </div>`;
  }).join('');
}

/* ════ QUIZ ════ */
function buildQueue(ti,cats){
  const q=[];
  (ti==='all'?DATA.map((_,i)=>i):[ti]).forEach(t=>cats.forEach(cat=>DATA[t][cat].forEach((p,pi)=>q.push({ti:t,cat,pi,...p}))));
  for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q[i],q[j]]=[q[j],q[i]];}
  return q;
}
function startQuiz(ti){
  quizQueue=buildQueue(ti,['action','emotion','social']);quizIdx=0;quizScore=0;
  document.getElementById('q-mode').textContent='☕ '+(ti==='all'?'全時間帯・全カテゴリ':DATA[ti].time+' '+DATA[ti].title);
  showScreen('quiz');renderCard();
}
function startQuizFiltered(){
  const cats=[...activeCats];
  if(!cats.length){alert('カテゴリを1つ以上選んでください');return;}
  quizQueue=buildQueue('all',cats);quizIdx=0;quizScore=0;
  const nm={action:'行動',emotion:'感情',social:'やりとり'};
  document.getElementById('q-mode').textContent='☕ '+cats.map(c=>nm[c]).join(' · ');
  showScreen('quiz');renderCard();
}
function renderCard(){
  if(quizIdx>=quizQueue.length){showResult();return;}
  const item=quizQueue[quizIdx];quizRevealed=false;
  document.getElementById('q-fill').style.width=Math.round(quizIdx/quizQueue.length*100)+'%';
  document.getElementById('q-counter').textContent=`${quizIdx+1} / ${quizQueue.length}`;
  const cl={action:'fc-cat-a',emotion:'fc-cat-e',social:'fc-cat-s'};
  const lb={action:'🏃 行動',emotion:'💭 感情',social:'💬 やりとり'};
  const ct=document.getElementById('fc-cat');
  ct.textContent=lb[item.cat];ct.className='fc-cat '+cl[item.cat];
  document.getElementById('fc-time').textContent=DATA[item.ti].time+' — '+DATA[item.ti].title;
  document.getElementById('fc-q').textContent=item.en;
  document.getElementById('fc-hint').textContent='📍 '+item.sit;
  document.getElementById('fc-ans-ja').textContent=item.ja;
  document.getElementById('fc-ans-sit').textContent=item.sit;
  document.getElementById('fc-answer').classList.remove('show');
  document.getElementById('flash-card').classList.remove('revealed');
  document.getElementById('judge-row').classList.add('hidden');
}
function revealCard(){
  if(quizRevealed)return;quizRevealed=true;
  document.getElementById('fc-answer').classList.add('show');
  document.getElementById('flash-card').classList.add('revealed');
  document.getElementById('judge-row').classList.remove('hidden');
  const item=quizQueue[quizIdx],key=item.ti+'_'+item.cat;
  if(!progress[key])progress[key]=new Set();
  progress[key].add(item.pi);
}
function judge(ok){
  if(ok){quizScore++;correctCount++;} updateStats();quizIdx++;renderCard();
}
function showResult(){
  const pct=Math.round(quizScore/quizQueue.length*100);
  document.getElementById('r-score').textContent=pct+'%';
  document.getElementById('r-pct').textContent=`${quizScore} / ${quizQueue.length} 正解`;
  const msgs=[[90,'すばらしい！☕','ほぼ完璧。Amy先生も誇りに思います！'],[70,'よくできました！','自信を持って使えるフレーズが増えています。'],[50,'着実に上達中！','もう一度挑戦してさらに定着させましょう。'],[0,'練習を続けよう！','毎日少しずつ、必ず身につきます。英語カフェはいつでも開いています☕']];
  const[,msg,sub]=msgs.find(([t])=>pct>=t);
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('r-sub').textContent=sub;
  showScreen('result');
}

/* ════ CAT FILTER ════ */
function toggleCat(cat,btn){
  if(activeCats.has(cat)){if(activeCats.size===1)return;activeCats.delete(cat);btn.className='cat-btn';}
  else{activeCats.add(cat);const m={action:'on-a',emotion:'on-e',social:'on-s'};btn.className='cat-btn '+m[cat];}
}

/* ════ UTILS ════ */
function updateStats(){
  document.getElementById('h-star').textContent=starred.size;
  document.getElementById('h-ok').textContent=correctCount;
}

/* ════ INIT ════ */
renderHomeGrid(); renderBrowseHome();
</script>
